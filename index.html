<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title id="site-title">Seikei Game Studio Portfolio</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts (DotGothic16 & Press Start 2P) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- GSAP for Animation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"DotGothic16"', 'sans-serif'],
                        pixel: ['"Press Start 2P"', 'cursive'],
                    },
                    colors: {
                        'cyber-black': '#050505',
                        'cyber-dark': '#0a0a0f',
                        'neon-cyan': '#00f3ff',
                        'neon-pink': '#ff0055',
                        'neon-yellow': '#ffe600',
                        'neon-green': '#00ff41',
                    },
                    backgroundImage: {
                        'grid-pattern': "linear-gradient(rgba(0, 243, 255, 0.1) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 243, 255, 0.1) 1px, transparent 1px)",
                    }
                }
            }
        }
    </script>
    
    <style>
        body {
            font-family: 'DotGothic16', sans-serif;
            background-color: #050505;
            color: #00f3ff;
            overflow-x: hidden;
        }

        /* 走査線エフェクト */
        .scanline {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: linear-gradient(
                to bottom,
                rgba(255,255,255,0),
                rgba(255,255,255,0) 50%,
                rgba(0,0,0,0.2) 50%,
                rgba(0,0,0,0.2)
            );
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.6;
        }
        
        /* 画面全体のちらつき */
        .crt-flicker {
            animation: flicker 0.15s infinite;
        }

        /* テキストのグロー効果 */
        .text-glow {
            text-shadow: 0 0 5px #00f3ff, 0 0 10px #00f3ff;
        }
        .text-glow-pink {
            text-shadow: 0 0 5px #ff0055, 0 0 10px #ff0055;
        }

        /* サイバーパンク枠 */
        .cyber-border {
            position: relative;
            clip-path: polygon(
                10px 0, 100% 0, 100% calc(100% - 10px), 
                calc(100% - 10px) 100%, 0 100%, 0 10px
            );
        }
        .cyber-border::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border: 1px solid #00f3ff;
            clip-path: polygon(
                10px 0, 100% 0, 100% calc(100% - 10px), 
                calc(100% - 10px) 100%, 0 100%, 0 10px
            );
            pointer-events: none;
        }

        /* グリッド背景のアニメーション */
        .bg-grid-moving {
            background-size: 40px 40px;
            animation: moveGrid 2s linear infinite;
        }
        @keyframes moveGrid {
            0% { background-position: 0 0; }
            100% { background-position: 0 40px; }
        }

        /* ページセクション遷移 */
        .page-section {
            display: none;
            opacity: 0;
        }
        .page-section.active {
            display: block;
            opacity: 1;
        }

        /* カスタムスクロールバー */
        ::-webkit-scrollbar {
            width: 10px;
        }
        ::-webkit-scrollbar-track {
            background: #0a0a0f;
        }
        ::-webkit-scrollbar-thumb {
            background: #00f3ff;
            border: 1px solid #0a0a0f;
        }
    </style>
</head>
<body class="flex flex-col min-h-screen selection:bg-neon-pink selection:text-white">

    <!-- CRTモニタ風のエフェクトレイヤー -->
    <div class="scanline"></div>

    <!-- ヘッダー (HUD風) -->
    <header class="fixed w-full top-0 z-50 bg-cyber-black/90 border-b border-neon-cyan/30 backdrop-blur-sm h-16 flex items-center">
        <div class="w-full px-4 sm:px-6 lg:px-8 flex justify-between items-center">
            <!-- ロゴ -->
            <div class="flex items-center cursor-pointer group" onclick="navigateTo('home')">
                <div id="logo-icon" class="w-8 h-8 bg-neon-cyan text-black flex items-center justify-center mr-2 font-pixel text-[0.6rem] animate-pulse">
                    P1
                </div>
                <span id="logo-text" class="font-pixel text-neon-cyan text-sm sm:text-base tracking-widest group-hover:text-white transition-colors">PORTFOLIO</span>
            </div>
            
            <!-- PC用ナビゲーション -->
            <nav id="main-nav" class="hidden md:flex space-x-1">
                <!-- Dynamic content will be loaded here -->
            </nav>

             <!-- 右端: JOINボタン -->
             <div class="flex items-center space-x-4">
                <button id="join-button" onclick="navigateTo('contact')" class="hidden md:flex items-center px-4 py-1 bg-neon-green/10 border border-neon-green text-neon-green hover:bg-neon-green hover:text-black transition-all">
                    <i data-lucide="gamepad-2" class="w-4 h-4 mr-2"></i>
                    <span>JOIN</span>
                </button>
                <button class="md:hidden text-neon-cyan" onclick="toggleMobileMenu()">
                    <i data-lucide="menu" class="w-6 h-6"></i>
                </button>
             </div>
        </div>
        
        <!-- モバイルメニュー -->
        <div id="mobile-menu" class="hidden md:hidden bg-cyber-dark absolute top-16 left-0 w-full border-b border-neon-cyan/50 z-50">
            <!-- Dynamic content will be loaded here -->
        </div>
    </header>

    <!-- メインコンテンツエリア -->
    <main class="flex-grow pt-16 relative">
        <!-- 背景グリッド -->
        <div class="fixed inset-0 bg-grid-pattern bg-grid-moving opacity-20 -z-10 transform perspective-1000 rotate-x-60 scale-150 origin-top"></div>
        
        <!-- ==================== HOME SECTION ==================== -->
        <section id="home" class="page-section active">
            
            <!-- ヒーローエリア -->
            <div class="relative w-full min-h-[85vh] flex items-center justify-center overflow-hidden">
                <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10 w-full">
                    <div class="flex flex-col md:flex-row items-center justify-between gap-12">
                        
                        <!-- テキスト -->
                        <div id="hero-content" class="md:w-1/2 gs-reveal">
                            <!-- Dynamic content will be loaded here -->
                        </div>

                        <!-- ヒーローグラフィック (ホログラム風) -->
                        <div class="md:w-1/2 flex justify-center gs-reveal">
                            <div class="relative w-72 h-72 md:w-96 md:h-96">
                                <div class="absolute inset-0 border-4 border-neon-cyan/30 rounded-full animate-spin-slow" style="animation-duration: 10s;"></div>
                                <div class="absolute inset-4 border-2 border-neon-pink/30 rounded-full animate-spin-slow" style="animation-duration: 15s; animation-direction: reverse;"></div>
                                <div class="absolute inset-0 flex items-center justify-center">
                                    <!-- 3Dモデルやロゴが入る想定のプレースホルダー -->
                                    <div class="w-48 h-48 bg-cyber-dark border border-neon-cyan flex items-center justify-center cyber-border shadow-[0_0_20px_rgba(0,243,255,0.2)]">
                                        <i id="hero-icon" data-lucide="cpu" class="w-24 h-24 text-neon-cyan animate-pulse"></i>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Status / Activity (活動内容) -->
            <div id="activity-section" class="py-24 bg-cyber-dark border-t border-neon-cyan/20 relative">
                <div class="absolute top-0 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-black px-4 py-1 border border-neon-cyan text-neon-cyan font-pixel text-sm">
                    CLUB STATUS
                </div>

                <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                    <div id="status-cards" class="grid grid-cols-1 md:grid-cols-3 gap-8">
                        <!-- Dynamic content will be loaded here -->
                    </div>
                </div>
            </div>

            <!-- Items / Works (作品一覧) -->
            <div id="works-grid" class="py-24 relative overflow-hidden">
                <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
                    <div class="flex items-end justify-between mb-12 border-b-2 border-neon-pink pb-4 gs-reveal">
                        <h2 id="works-title" class="text-3xl font-pixel text-white text-glow-pink">INVENTORY</h2>
                        <span id="works-subtitle" class="text-neon-pink text-xs animate-pulse">Select Item...</span>
                    </div>

                    <div id="works-items" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                        <!-- Dynamic content will be loaded here -->
                    </div>
                </div>
            </div>

            <!-- News / Logs (お知らせ) -->
            <div class="py-24 bg-cyber-dark border-y border-neon-cyan/10">
                <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
                    <div class="flex items-center gap-4 mb-8 gs-reveal">
                        <i id="logs-icon" data-lucide="terminal" class="text-neon-green w-8 h-8"></i>
                        <h2 id="logs-title" class="text-2xl font-pixel text-neon-green">SYSTEM LOGS</h2>
                    </div>

                    <div id="logs-entries" class="space-y-4 font-mono gs-reveal">
                        <!-- Dynamic content will be loaded here -->
                    </div>

                    <!-- すべてのlogを見るボタン -->
                    <div class="mt-8 text-center gs-reveal">
                        <button id="view-all-logs" onclick="navigateTo('news')" class="px-6 py-3 border border-neon-green text-neon-green hover:bg-neon-green hover:text-black transition-all font-mono">
                            すべてのlogを見る &gt;&gt;
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <!-- ==================== NEWS SECTION (ログ一覧) ==================== -->
        <section id="news" class="page-section">
            <div class="py-24 min-h-screen">
                <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
                    <div class="mb-12 border-b border-neon-green pb-4">
                        <h2 id="news-page-title" class="text-3xl font-pixel text-neon-green">ALL LOGS</h2>
                        <p id="news-page-subtitle" class="text-sm text-gray-400 mt-2"></p>
                    </div>
                    <div id="news-articles" class="space-y-4 font-mono">
                        <!-- Dynamic content will be loaded here -->
                    </div>
                    <div class="mt-8">
                        <button id="news-back-button" onclick="navigateTo('home')" class="text-neon-cyan hover:underline px-4 py-2 border border-neon-cyan hover:bg-neon-cyan hover:text-black transition-all">&lt; BACK TO HOME</button>
                    </div>
                </div>
            </div>
        </section>

        <!-- ==================== LOG DETAIL SECTION (ログ詳細) ==================== -->
        <section id="log-detail" class="page-section">
            <div class="py-24 min-h-screen">
                <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
                    <div id="log-detail-content">
                        <!-- Dynamic content will be loaded here -->
                    </div>
                    <div class="mt-8">
                        <button id="log-detail-back-button" onclick="navigateTo('news')" class="text-neon-cyan hover:underline px-4 py-2 border border-neon-cyan hover:bg-neon-cyan hover:text-black transition-all">&lt; BACK TO LOGS</button>
                    </div>
                </div>
            </div>
        </section>

        <!-- ==================== CONTACT SECTION (変更点) ==================== -->
        <section id="contact" class="page-section">
            <div class="min-h-screen flex items-center justify-center relative">
                <!-- 背景アニメーション -->
                <div class="absolute inset-0 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-neon-pink/10 via-black to-black -z-10"></div>
                
                <div id="contact-content" class="max-w-3xl w-full mx-auto px-4 sm:px-6 lg:px-8 text-center gs-reveal">
                    <!-- Dynamic content will be loaded here -->
                </div>
            </div>
        </section>

    </main>

    <!-- フッター -->
    <footer class="bg-black border-t-4 border-neon-cyan py-8">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col md:flex-row justify-between items-center gap-4">
            <div id="footer-text" class="text-neon-cyan font-pixel text-sm">
                GAME OVER / CONTINUE?
            </div>
            <div id="footer-social" class="flex space-x-6">
                <!-- Dynamic content will be loaded here -->
            </div>
            <div id="footer-copyright" class="text-gray-600 text-xs font-mono">
                &copy; 2024 GAMING CLUB. ALL RIGHTS RESERVED.
            </div>
        </div>
    </footer>

    <script>
        // JSONデータを読み込む
        let contentData = null;

        async function loadContent() {
            try {
                const response = await fetch('content.json');
                contentData = await response.json();
                renderPage();
            } catch (error) {
                console.error('Failed to load content:', error);
            }
        }

        function renderPage() {
            if (!contentData) return;

            // タイトル
            document.getElementById('site-title').textContent = contentData.site.title;
            
            // ロゴ
            document.getElementById('logo-icon').textContent = contentData.site.logo.icon;
            document.getElementById('logo-text').textContent = contentData.site.logo.text;

            // ナビゲーション
            renderNavigation();

            // ヒーロー
            renderHero();

            // ステータスカード
            renderStatusCards();

            // 作品
            renderWorks();

            // ログ
            renderLogs();

            // ニュースページ
            renderNewsPage();

            // コンタクトページ
            renderContact();

            // フッター
            renderFooter();

            // アイコン再初期化
            lucide.createIcons();
        }

        function renderNavigation() {
            const mainNav = document.getElementById('main-nav');
            mainNav.innerHTML = contentData.navigation.menu.map(item => {
                const action = item.action === 'navigate' 
                    ? `navigateTo('${item.id}')`
                    : `scrollToSection('${item.id}')`;
                return `
                    <button onclick="${action}" class="px-4 py-1 text-neon-cyan hover:bg-neon-cyan hover:text-black transition-all border border-transparent hover:border-neon-cyan skew-x-[-10deg]">
                        <span class="skew-x-[10deg] block">${item.label}</span>
                    </button>
                `;
            }).join('');

            // モバイルメニュー
            const mobileMenu = document.getElementById('mobile-menu');
            mobileMenu.innerHTML = `
                <div class="flex flex-col p-4 space-y-2">
                    ${contentData.navigation.menu.map(item => {
                        const action = item.action === 'navigate' 
                            ? `navigateTo('${item.id}')`
                            : `scrollToSection('${item.id}')`;
                        return `<button onclick="${action}" class="text-left px-4 py-3 text-neon-cyan border border-neon-cyan/20 hover:bg-neon-cyan/10">${item.label}</button>`;
                    }).join('')}
                    <button onclick="navigateTo('contact')" class="text-left px-4 py-3 text-neon-green border border-neon-green/20 hover:bg-neon-green/10 font-bold">${contentData.navigation.joinButton.label}</button>
                </div>
            `;

            // JOINボタン
            const joinBtn = document.getElementById('join-button');
            joinBtn.querySelector('span').textContent = contentData.navigation.joinButton.label;
        }

        function renderHero() {
            const heroContent = document.getElementById('hero-content');
            const hero = contentData.hero;
            
            heroContent.innerHTML = `
                <div class="inline-block px-2 py-1 bg-neon-cyan/20 border border-neon-cyan text-neon-cyan text-xs mb-4">
                    ${hero.badge}
                </div>
                <h1 class="text-5xl md:text-7xl font-pixel leading-tight mb-6 text-white text-glow">
                    ${hero.title.line1}<br>
                    <span class="text-neon-cyan">${hero.title.line2}</span>
                </h1>
                <p class="text-lg text-gray-400 mb-8 border-l-4 border-neon-pink pl-4 leading-relaxed">
                    ${hero.description}
                </p>
                <div class="flex flex-wrap gap-4">
                    ${hero.buttons.map(btn => {
                        const action = btn.action === 'navigate' 
                            ? `navigateTo('${btn.target}')`
                            : `scrollToSection('${btn.target}')`;
                        const classes = btn.style === 'primary'
                            ? 'px-8 py-4 bg-neon-cyan text-black font-bold font-pixel hover:bg-white hover:scale-105 transition-transform shadow-[0_0_15px_rgba(0,243,255,0.5)]'
                            : btn.style === 'green'
                            ? 'px-8 py-4 bg-transparent border-2 border-neon-green text-neon-green font-bold font-pixel hover:bg-neon-green hover:text-black transition-colors shadow-[0_0_15px_rgba(0,255,65,0.3)]'
                            : 'px-8 py-4 bg-transparent border-2 border-neon-pink text-neon-pink font-bold font-pixel hover:bg-neon-pink hover:text-black transition-colors shadow-[0_0_15px_rgba(255,0,85,0.3)]';
                        return `<button onclick="${action}" class="${classes}">${btn.label}</button>`;
                    }).join('')}
                </div>
            `;

            // ヒーローアイコン
            document.getElementById('hero-icon').setAttribute('data-lucide', hero.graphic.icon);
        }

        function renderStatusCards() {
            const statusCards = document.getElementById('status-cards');
            statusCards.innerHTML = contentData.status.cards.map(card => {
                let content = '';
                if (card.data) {
                    content = `
                        <div class="space-y-2 text-gray-400 text-sm">
                            ${card.data.map(item => {
                                const colorClass = item.color === 'green' ? 'text-neon-green' : 'text-white';
                                return `
                                    <div class="flex justify-between border-b border-gray-800 pb-1">
                                        <span>${item.label}</span>
                                        <span class="${colorClass}">${item.value}</span>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    `;
                } else if (card.tags) {
                    content = `
                        <div class="flex flex-wrap gap-2 mt-2">
                            ${card.tags.map(tag => {
                                const colorClasses = {
                                    cyan: 'bg-neon-cyan/10 border-neon-cyan/50 text-neon-cyan',
                                    pink: 'bg-neon-pink/10 border-neon-pink/50 text-neon-pink',
                                    yellow: 'bg-neon-yellow/10 border-neon-yellow/50 text-neon-yellow'
                                };
                                return `<span class="px-2 py-1 ${colorClasses[tag.color]} border text-xs">${tag.label}</span>`;
                            }).join('')}
                        </div>
                    `;
                }
                
                return `
                    <div class="cyber-border bg-black/50 p-6 hover:bg-neon-cyan/5 transition-colors group gs-reveal">
                        <div class="flex items-center justify-between mb-4">
                            <h3 class="text-xl text-white font-bold group-hover:text-neon-cyan transition-colors">${card.title}</h3>
                            <i data-lucide="${card.icon}" class="text-neon-cyan"></i>
                        </div>
                        ${content}
                    </div>
                `;
            }).join('');
        }

        function renderWorks() {
            document.getElementById('works-title').textContent = contentData.works.title;
            document.getElementById('works-subtitle').textContent = contentData.works.subtitle;

            const worksItems = document.getElementById('works-items');
            worksItems.innerHTML = contentData.works.items.map(work => {
                const colorMap = {
                    cyan: { overlay: 'bg-neon-cyan/20', border: 'border-neon-cyan', text: 'text-neon-cyan', bar: 'bg-neon-cyan' },
                    pink: { overlay: 'bg-neon-pink/20', border: 'border-neon-pink', text: 'text-neon-pink', bar: 'bg-neon-pink' },
                    yellow: { overlay: 'bg-neon-yellow/20', border: 'border-neon-yellow', text: 'text-neon-yellow', bar: 'bg-neon-yellow' }
                };
                const colors = colorMap[work.color];

                return `
                    <div class="group relative cursor-pointer gs-reveal">
                        <div class="cyber-border h-64 w-full bg-gray-900 overflow-hidden relative">
                            <div class="w-full h-full flex items-center justify-center bg-gray-800 group-hover:scale-110 transition-transform duration-500">
                                <i data-lucide="image" class="w-16 h-16 text-gray-700"></i>
                            </div>
                            <div class="absolute inset-0 ${colors.overlay} opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center backdrop-blur-sm">
                                <span class="px-4 py-2 bg-black border ${colors.border} ${colors.text} font-pixel text-xs">PLAY</span>
                            </div>
                        </div>
                        <div class="mt-4 px-2">
                            <div class="flex justify-between items-center">
                                <h3 class="text-lg font-bold text-white group-hover:${colors.text} transition-colors">${work.title}</h3>
                                <span class="text-xs text-gray-500 border border-gray-700 px-1">Lv.${work.level}</span>
                            </div>
                            <div class="w-full bg-gray-800 h-1 mt-2">
                                <div class="${colors.bar} h-full" style="width: 100%"></div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderLogs() {
            document.getElementById('logs-icon').setAttribute('data-lucide', contentData.logs.icon);
            document.getElementById('logs-title').textContent = contentData.logs.title;

            // 最新3件のみ表示
            const logsEntries = document.getElementById('logs-entries');
            const recentLogs = contentData.logs.entries.slice(0, 3);
            
            logsEntries.innerHTML = recentLogs.map(log => {
                const colorMap = {
                    green: { border: 'border-neon-green', text: 'text-neon-green', hover: 'hover:bg-neon-green/10' },
                    cyan: { border: 'border-neon-cyan', text: 'text-neon-cyan', hover: 'hover:bg-neon-cyan/10' },
                    gray: { border: 'border-gray-600', text: 'text-gray-500', hover: 'hover:bg-gray-800' }
                };
                const colors = colorMap[log.color];

                return `
                    <a href="#" onclick="event.preventDefault(); navigateToLogDetail('${log.id}')" class="block p-4 border-l-2 ${colors.border} bg-black/40 ${colors.hover} transition-colors cursor-pointer">
                        <div class="flex flex-col md:flex-row gap-2 md:gap-4 text-sm">
                            <span class="${colors.text}">[${log.date}]</span>
                            <span class="text-white">${log.title}</span>
                            <span class="text-gray-400">${log.description}</span>
                        </div>
                    </a>
                `;
            }).join('');

            // 「すべてのlogを見る」ボタンのテキスト設定
            if(contentData.logs.viewAllButton) {
                document.getElementById('view-all-logs').textContent = contentData.logs.viewAllButton;
            }
        }

        function renderNewsPage() {
            document.getElementById('news-page-title').textContent = contentData.newsPage.title;
            if(contentData.newsPage.subtitle) {
                document.getElementById('news-page-subtitle').textContent = contentData.newsPage.subtitle;
            }
            document.getElementById('news-back-button').textContent = contentData.newsPage.backButton;

            // 全ログを一覧表示
            const newsArticles = document.getElementById('news-articles');
            newsArticles.innerHTML = contentData.logs.entries.map(log => {
                const colorMap = {
                    green: { border: 'border-neon-green', text: 'text-neon-green', hover: 'hover:bg-neon-green/10' },
                    cyan: { border: 'border-neon-cyan', text: 'text-neon-cyan', hover: 'hover:bg-neon-cyan/10' },
                    gray: { border: 'border-gray-600', text: 'text-gray-500', hover: 'hover:bg-gray-800' }
                };
                const colors = colorMap[log.color];

                return `
                    <a href="#" onclick="event.preventDefault(); navigateToLogDetail('${log.id}')" class="block p-4 border-l-2 ${colors.border} bg-black/40 ${colors.hover} transition-colors cursor-pointer">
                        <div class="flex flex-col md:flex-row gap-2 md:gap-4 text-sm">
                            <span class="${colors.text}">[${log.date}]</span>
                            <span class="text-white font-bold">${log.title}</span>
                            <span class="text-gray-400">${log.description}</span>
                        </div>
                    </a>
                `;
            }).join('');
        }

        // ログ詳細ページをレンダリング
        function renderLogDetail(logId) {
            const log = contentData.logs.entries.find(l => l.id === logId);
            if (!log) return;

            const colorMap = {
                green: { border: 'border-neon-green', text: 'text-neon-green', bg: 'bg-neon-green/10' },
                cyan: { border: 'border-neon-cyan', text: 'text-neon-cyan', bg: 'bg-neon-cyan/10' },
                gray: { border: 'border-gray-600', text: 'text-gray-500', bg: 'bg-gray-800/50' }
            };
            const colors = colorMap[log.color];

            const logDetailContent = document.getElementById('log-detail-content');
            logDetailContent.innerHTML = `
                <div class="border-l-4 ${colors.border} pl-6">
                    <div class="mb-4">
                        <span class="${colors.text} text-sm font-mono">[${log.date}]</span>
                    </div>
                    <h2 class="text-4xl font-pixel text-white mb-6 ${colors.text}">${log.title}</h2>
                    <div class="${colors.bg} p-3 border ${colors.border} mb-6">
                        <p class="text-gray-400 text-sm font-bold">${log.description}</p>
                    </div>
                    <div class="prose prose-invert max-w-none">
                        <p class="text-gray-300 leading-relaxed text-base whitespace-pre-wrap">${log.content}</p>
                    </div>
                </div>
            `;

            if(contentData.logDetailPage && contentData.logDetailPage.backButton) {
                document.getElementById('log-detail-back-button').textContent = contentData.logDetailPage.backButton;
            }
        }

        // ログ詳細ページへ遷移
        function navigateToLogDetail(logId) {
            renderLogDetail(logId);
            navigateTo('log-detail');
            lucide.createIcons();
        }

        function renderContact() {
            const contactContent = document.getElementById('contact-content');
            const contact = contentData.contact;

            contactContent.innerHTML = `
                <div class="mb-8 animate-bounce">
                    <i data-lucide="${contact.icon}" class="w-16 h-16 text-neon-pink mx-auto"></i>
                </div>

                <h2 class="text-4xl md:text-5xl font-pixel text-white mb-6 text-glow-pink">
                    ${contact.title}
                </h2>
                
                <p class="text-lg text-gray-300 mb-12 max-w-xl mx-auto leading-loose">
                    ${contact.description}
                </p>

                <div class="relative group inline-block">
                    <div class="absolute -inset-1 bg-gradient-to-r from-neon-pink via-neon-cyan to-neon-pink rounded-lg blur opacity-75 group-hover:opacity-100 transition duration-1000 group-hover:duration-200 animate-tilt"></div>
                    <a href="${contact.button.url}" target="_blank" rel="noopener noreferrer" class="relative flex items-center justify-center px-12 py-6 bg-black rounded-lg leading-none border border-gray-800">
                        <span class="flex items-center space-x-4">
                            <i data-lucide="${contact.button.icon}" class="w-6 h-6 text-neon-pink group-hover:rotate-45 transition-transform duration-300"></i>
                            <span class="text-xl font-bold text-gray-100 group-hover:text-neon-cyan transition-colors font-pixel">
                                ${contact.button.label}
                            </span>
                        </span>
                    </a>
                </div>

                <div class="mt-12 text-sm text-gray-500 font-mono">
                    ${contact.warning}
                </div>
            `;
        }

        function renderFooter() {
            document.getElementById('footer-text').textContent = contentData.footer.text;
            document.getElementById('footer-copyright').innerHTML = contentData.footer.copyright;

            const footerSocial = document.getElementById('footer-social');
            footerSocial.innerHTML = contentData.footer.social.map(social => `
                <a href="${social.url}" class="text-gray-500 hover:text-white transition-colors">
                    <i data-lucide="${social.icon}" class="w-5 h-5"></i>
                </a>
            `).join('');
        }

        // ページ読み込み時にコンテンツを読み込む
        window.addEventListener('DOMContentLoaded', loadContent);

        // アイコン初期化
        lucide.createIcons();

        // ページ遷移制御
        function navigateTo(pageId) {
            const sections = document.querySelectorAll('.page-section');
            const target = document.getElementById(pageId);
            
            if(!target) return;

            // 効果音を入れるならここ（今回は省略）

            // 画面を一瞬暗転させる（グリッチ演出などもあり）
            
            // スクロールトップ
            window.scrollTo({ top: 0, behavior: 'auto' });

            // 全セクションを非表示
            sections.forEach(sec => {
                sec.classList.remove('active');
                sec.style.opacity = '0';
            });

            // ターゲットを表示
            target.classList.add('active');
            
            setTimeout(() => {
                target.style.opacity = '1';
                ScrollTrigger.refresh();
            }, 100);

            // モバイルメニューを閉じる
            document.getElementById('mobile-menu').classList.add('hidden');
        }

        // 同一ページ内のスクロール
        function scrollToSection(id) {
            // モバイルメニューを閉じる
            document.getElementById('mobile-menu').classList.add('hidden');
            
            const home = document.getElementById('home');
            if (!home.classList.contains('active')) {
                navigateTo('home');
                setTimeout(() => {
                    const target = document.getElementById(id);
                    if(target) target.scrollIntoView({ behavior: 'smooth' });
                }, 200);
            } else {
                const target = document.getElementById(id);
                if(target) target.scrollIntoView({ behavior: 'smooth' });
            }
        }

        function toggleMobileMenu() {
            document.getElementById('mobile-menu').classList.toggle('hidden');
        }

        // アニメーション制御 (GSAP)
        gsap.registerPlugin(ScrollTrigger);

        window.addEventListener('load', () => {
            // スクロール時の出現アニメーション
            const revealElements = document.querySelectorAll('.gs-reveal');
            
            revealElements.forEach((element) => {
                gsap.fromTo(element, 
                    { y: 50, opacity: 0, scale: 0.9 },
                    {
                        y: 0,
                        opacity: 1,
                        scale: 1,
                        duration: 0.6,
                        ease: "back.out(1.7)", // バウンドするような動き
                        scrollTrigger: {
                            trigger: element,
                            start: "top 85%",
                        }
                    }
                );
            });
        });

    </script>
</body>
</html>
